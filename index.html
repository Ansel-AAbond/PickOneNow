        btnEl.setAttribute('aria-label', '取消静音');
      } else {
        // 正常喇叭图标
        iconEl.innerHTML = `
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        `;
        btnEl.classList.remove('muted');
        btnEl.setAttribute('aria-label', '静音模式');
      }
    }

    /**
     * 检测指针是否划过扇区边界
     * 在动画循环中调用，比较当前扇区索引和上次索引
     * 如果索引发生变化，说明指针跨过了边界线
     * 
     * @param {Number} currentAngle - 当前转盘的旋转角度（弧度）
     * @param {Number} sectorCount - 当前选项数量（扇区数量）
     * @returns {Boolean} - 是否跨过了扇区边界
     */
    function checkSectorBoundary(currentAngle, sectorCount) {
      const sectorAngle = (2 * Math.PI) / sectorCount;
      const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      const currentSectorIndex = Math.floor(normalizedAngle / sectorAngle);

      // 与上次记录的索引比较
      if (currentSectorIndex !== lastPlayedSectorIndex) {
        lastPlayedSectorIndex = currentSectorIndex;
        return true; // 跨过了边界
      }
      return false;
    }

    /**
     * 记录上次播放咔嗒声时的扇区索引
     * 用于检测是否跨过了新的边界
     */
    let lastPlayedSectorIndex = -1;

    /**
     * =============================================
     * 【开发者注意】后续开发新转盘场景时，仅需修改 SCENES 配置数组即可
     * =============================================
     * 
     * 每个场景包含以下字段：
     * - id: 场景唯一标识符（英文字符串）
     * - icon: 场景图标 emoji
     * - themeName: 转盘主题名称，显示在页面顶部标题
     * - defaultOptions: 默认选项数组，每个元素代表一个扇区
     * - colors: 配色方案数组，用于交替渲染扇区颜色
     * - spinDuration: 旋转总时长（毫秒）
     * - canvasSize: 转盘 Canvas 逻辑尺寸（像素）
     * 
     * 新增场景只需在 SCENES 数组中添加一个新对象！
     * =============================================
     */
    const SCENES = [
      {
        id: 'food',
        icon: '🍽️',
        themeName: '今天吃什么',
        defaultOptions: ['火锅', '烧烤', '日料', '披萨', '麻辣烫', '快餐', '中餐', '沙拉'],
        colors: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#82E0AA'],
        spinDuration: 5000,
        canvasSize: 450
      },
      {
        id: 'exercise',
        icon: '🏃',
        themeName: '今天做什么运动',
        defaultOptions: ['跑步', '游泳', '瑜伽', '骑行', '跳绳', '举重', '打篮球', '打羽毛球'],
        colors: ['#FF6348', '#7BED9F', '#70A1FF', '#FFA502', '#2ED573', '#1E90FF', '#FF4757', '#5352ED'],
        spinDuration: 5000,
        canvasSize: 450
      },
      {
        id: 'weekend',
        icon: '🎡',
        themeName: '周末去哪玩',
        defaultOptions: ['爬山', '海边', '公园', '博物馆', '游乐园', '古镇', '露营', '电影院'],
        colors: ['#A29BFE', '#FD79A8', '#FDCB6E', '#00CEC9', '#E17055', '#6C5CE7', '#00B894', '#FAB1A0'],
        spinDuration: 5000,
        canvasSize: 450
      },
      {
        id: 'party',
        icon: '🎉',
        themeName: '聚会玩什么',
        defaultOptions: ['桌游', 'KTV', '密室逃脱', '剧本杀', '狼人杀', '真心话大冒险', '打牌', '电竞赛'],
        colors: ['#FF9FF3', '#FECA57', '#FF6B6B', '#48DBFB', '#FF9FF3', '#54A0FF', '#5F27CD', '#01A3A4'],
        spinDuration: 5000,
        canvasSize: 450
      }
    ];

    /**
     * =============================================
     * 自定义场景管理模块
     * 使用 localStorage 持久化用户创建的自定义场景
     * =============================================
     */

    /**
     * localStorage 键名：存储用户创建的所有自定义场景
     * 数据结构：数组，每个元素包含场景的所有配置
     */
    const CUSTOM_SCENES_STORAGE_KEY = 'wheel-custom-scenes';

    /**
     * 从 localStorage 加载自定义场景
     * @returns {Array} - 自定义场景数组
     */
    function loadCustomScenes() {
      try {
        const saved = localStorage.getItem(CUSTOM_SCENES_STORAGE_KEY);
        if (saved) {
          return JSON.parse(saved);
        }
      } catch (e) {
        console.warn('Failed to load custom scenes:', e);
      }
      return [];
    }

    /**
     * 保存所有自定义场景到 localStorage
     * @param {Array} customScenes - 自定义场景数组
     */
    function saveCustomScenes(customScenes) {
      try {
        localStorage.setItem(CUSTOM_SCENES_STORAGE_KEY, JSON.stringify(customScenes));
      } catch (e) {
        console.warn('Failed to save custom scenes:', e);
      }
    }

    /**
     * 生成唯一的自定义场景 ID
     * 使用 "custom_" 前缀 + 时间戳，避免与预设场景 ID 冲突
     * @returns {String} - 唯一场景 ID
     */
    function generateCustomSceneId() {
      return 'custom_' + Date.now();
    }

    /**
     * 生成随机配色方案
     * 为自定义场景提供一组和谐的颜色
     * @returns {Array} - 颜色数组
     */
    function generateRandomColors(count) {
      const presetColors = [
        '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
        '#F7DC6F', '#BB8FCE', '#82E0AA', '#A29BFE', '#FD79A8',
        '#FDCB6E', '#00CEC9', '#E17055', '#6C5CE7', '#00B894',
        '#FAB1A0', '#74B9FF', '#55EFC4', '#FFEAA7', '#DFE6E9'
      ];

      // 随机打乱并选取所需数量
      const shuffled = [...presetColors].sort(() => Math.random() - 0.5);
      const colors = [];
      for (let i = 0; i < count; i++) {
        colors.push(shuffled[i % shuffled.length]);
      }
      return colors;
    }

    /**
     * 创建自定义场景对象
     * @param {String} name - 场景名称
     * @param {Array} options - 选项数组
     * @returns {Object} - 完整的场景对象
     */
    function createCustomScene(name, options) {
      return {
        id: generateCustomSceneId(),
        icon: '✨',
        themeName: name,
        defaultOptions: [...options],
        colors: generateRandomColors(options.length),
        spinDuration: 5000,
        canvasSize: 450,
        isCustom: true // 标记为自定义场景，用于区分预设场景（不可删除）
      };
    }

    /**
     * 加载并合并所有场景（预设 + 自定义）
     * @returns {Array} - 合并后的完整场景列表
     */
    function getAllScenes() {
      const customScenes = loadCustomScenes();
      return [...SCENES, ...customScenes];
    }

    /**
     * 保存新的自定义场景
     * @param {Object} newScene - 新的场景对象
     */
    function addCustomScene(newScene) {
      const customScenes = loadCustomScenes();
      customScenes.push(newScene);
      saveCustomScenes(customScenes);
    }

    /**
     * 删除自定义场景
     * @param {String} sceneId - 要删除的场景 ID
     */
    function removeCustomScene(sceneId) {
      let customScenes = loadCustomScenes();
      customScenes = customScenes.filter(scene => scene.id !== sceneId);
      saveCustomScenes(customScenes);
    }

    /**
     * 当前完整的场景列表（预设 + 自定义）
     */
    let ALL_SCENES = getAllScenes();

    let APP_CONFIG = { ...ALL_SCENES[0], colors: [...ALL_SCENES[0].colors], defaultOptions: [...ALL_SCENES[0].defaultOptions] };

    let currentSceneIndex = 0;

    const state = {
      isSpinning: false,
      currentRotation: 0,
      options: [...APP_CONFIG.defaultOptions]
    };

    const dom = {
      canvas: document.getElementById('wheelCanvas'),
      ctx: null,
      spinBtn: document.getElementById('spinBtn'),
      hint: document.getElementById('hintText'),
      optionInput: document.getElementById('optionInput'),
      addBtn: document.getElementById('addBtn'),
      optionsList: document.getElementById('optionsList'),
      themeTitle: document.getElementById('themeTitle'),
      modalOverlay: document.getElementById('modalOverlay'),
      modalResult: document.getElementById('modalResult'),
      modalCloseBtn: document.getElementById('modalCloseBtn'),
      modalEmoji: document.getElementById('modalEmoji'),
      particles: document.getElementById('particlesContainer'),
      sidebar: document.getElementById('sidebar'),
      sidebarToggle: document.getElementById('sidebarToggle'),
      sidebarNav: document.getElementById('sidebarNav'),
      mobileMenuBtn: document.getElementById('mobileMenuBtn'),
      sidebarOverlay: document.getElementById('sidebarOverlay'),
      themeToggle: document.getElementById('themeToggle'),
      muteToggle: document.getElementById('muteToggle')
    };

    const dpr = window.devicePixelRatio || 1;

    /**
     * 初始化 DOM 引用
     * 使用 devicePixelRatio 提升 Canvas 渲染分辨率，确保文字清晰
     */
    function initDOM() {
      dom.ctx = dom.canvas.getContext('2d');
      dom.themeTitle.textContent = APP_CONFIG.themeName;

      const logicalSize = APP_CONFIG.canvasSize;
      const physicalSize = Math.round(logicalSize * dpr);

      dom.canvas.width = physicalSize;
      dom.canvas.height = physicalSize;
      dom.canvas.style.width = logicalSize + 'px';
      dom.canvas.style.height = logicalSize + 'px';

      dom.ctx.scale(dpr, dpr);

      updateUI();
    }

    /**
     * 绘制转盘
     * 所有坐标使用逻辑像素（logical pixels），由 ctx.scale(dpr) 自动映射到物理像素
     */
    function drawWheel(options, colors, rotation = 0) {
      const ctx = dom.ctx;
      const size = APP_CONFIG.canvasSize;
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size / 2 - 30;

      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotation);

      const arcAngle = (2 * Math.PI) / options.length;

      // 外圈装饰底环
      ctx.beginPath();
      ctx.arc(0, 0, radius + 15, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.fill();

      // 外圈装饰小圆点
      const dotCount = options.length * 3;
      for (let i = 0; i < dotCount; i++) {
        const angle = (i / dotCount) * 2 * Math.PI;
        const dotX = Math.cos(angle) * (radius + 15);
        const dotY = Math.sin(angle) * (radius + 15);

        ctx.beginPath();
        ctx.arc(dotX, dotY, 3, 0, 2 * Math.PI);
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255, 255, 255, 0.4)' : colors[i % colors.length];
        ctx.fill();
      }

      // 外圈光环
      ctx.beginPath();
      ctx.arc(0, 0, radius + 10, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 4;
      ctx.stroke();

      options.forEach((option, index) => {
        const startAngle = index * arcAngle;
        const endAngle = startAngle + arcAngle;
        const color = colors[index % colors.length];

        // 扇区径向渐变
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
        gradient.addColorStop(0, lightenColor(color, 30));
        gradient.addColorStop(1, color);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 文字 - 使用动态字号，根据屏幕宽度自动适配
        ctx.save();
        ctx.rotate(startAngle + arcAngle / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';

        // 动态计算字号：小屏幕自动缩小
        const fontSize = getDynamicFontSize(options.length);
        ctx.font = `bold ${fontSize}px "Noto Sans SC", sans-serif`;
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 4;

        const textX = radius * 0.65;
        ctx.fillText(option, textX, 0);
        ctx.restore();
      });

      // 中心圆装饰
      ctx.beginPath();
      ctx.arc(0, 0, 28, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, 2 * Math.PI);
      ctx.fillStyle = APP_CONFIG.colors[0];
      ctx.fill();

      ctx.restore();
    }

    function lightenColor(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      const r = Math.min(255, (num >> 16) + Math.round(255 * percent / 100));
      const g = Math.min(255, ((num & 0x0000FF) >> 8) + Math.round(255 * percent / 100));
      const b = Math.min(255, (num & 0x0000FF) + Math.round(255 * percent / 100));
      return `rgb(${r}, ${g}, ${b})`;
    }

    /**
     * =============================================
     * 移动端响应式适配模块
     * 功能：
     *   1. 动态计算转盘 Canvas 尺寸（根据屏幕宽度）
     *   2. 根据转盘尺寸动态调整扇区文字大小
     *   3. 监听窗口大小变化（resize 事件），横竖屏切换自动适配
     * =============================================
     */

    /**
     * 计算移动端合适的转盘尺寸
     * 优先使用 CSS 计算出的实际容器宽度，确保转盘在手机上居中且留有呼吸间距
     * @returns {Number} - 转盘逻辑尺寸（像素）
     */
    function calculateWheelSize() {
      const container = document.querySelector('.wheel-container');
      if (!container) return APP_CONFIG.canvasSize;

      // 获取容器实际渲染宽度（CSS clamp 计算后的值）
      const containerWidth = container.getBoundingClientRect().width;

      // 使用容器宽度作为转盘逻辑尺寸
      // 在移动端，容器宽度约为 80vw，约为 260-400px
      const logicalSize = Math.round(containerWidth);

      // 限制尺寸范围，防止过小或过大
      const minSize = 260;
      const maxSize = 500;
      return Math.max(minSize, Math.min(maxSize, logicalSize));
    }

    /**
     * 根据转盘半径动态计算扇区文字大小
     * 小屏幕上文字自动缩小，确保不重叠且清晰可读
     * @param {Number} radius - 转盘半径（逻辑像素）
     * @param {Number} optionCount - 选项数量
     * @returns {Number} - 合适的文字字号（像素）
     */
    function calculateFontSize(radius, optionCount) {
      // 基础字号基于半径比例计算
      // 半径的 5%-7% 作为基础字号
      const baseFontSize = Math.round(radius * 0.065);

      // 根据选项数量进行缩放
      let scaleFactor = 1;
      if (optionCount > 12) scaleFactor = 0.75;
      else if (optionCount > 8) scaleFactor = 0.85;

      const fontSize = Math.round(baseFontSize * scaleFactor);

      // 限制字号范围
      const minFontSize = 10;
      const maxFontSize = 18;
      return Math.max(minFontSize, Math.min(maxFontSize, fontSize));
    }

    /**
     * 窗口大小变化时的处理逻辑
     * 重新计算转盘尺寸，并触发重绘
     */
    let resizeTimer = null;
    function handleResize() {
      // 使用防抖，避免频繁触发
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (!state.isSpinning) {
          // 获取新的转盘尺寸
          const newLogicalSize = calculateWheelSize();

          // 更新 Canvas 物理尺寸
          const physicalSize = Math.round(newLogicalSize * dpr);
          dom.canvas.width = physicalSize;
          dom.canvas.height = physicalSize;

          // 重新设置高清缩放
          dom.ctx.setTransform(1, 0, 0, 1, 0, 0);
          dom.ctx.scale(dpr, dpr);

          // 更新 APP_CONFIG 中的 canvasSize
          APP_CONFIG.canvasSize = newLogicalSize;

          // 重绘转盘
          drawWheel(state.options, APP_CONFIG.colors, state.currentRotation);
        }
      }, 200);
    }

    /**
     * 获取当前转盘的动态字号（供 drawWheel 调用）
     * @param {Number} optionCount - 选项数量
     * @returns {Number} - 当前合适的字号
     */
    function getDynamicFontSize(optionCount) {
      const size = APP_CONFIG.canvasSize;
      const radius = size / 2 - 30;
      return calculateFontSize(radius, optionCount);
    }

    /**
     * 物理缓动动画控制器
     * 使用 easeOutQuart 缓动曲线：f(t) = 1 - (1-t)^4
     * 特性：
     *   - f(0) = 0, f(1) = 1
     *   - f'(t) = 4(1-t)^3，f'(1) = 0 => 终点速度为 0，绝无反弹
     *   - 单调递减的速度曲线，模拟摩擦力越来越大
     */
    function spinAnimation(duration, onUpdate, onComplete) {
      const startTime = performance.now();

      const sectorCount = state.options.length;
      const sectorAngle = (2 * Math.PI) / sectorCount;

      const currentBaseAngle = state.currentRotation;
      const targetIndex = Math.floor(Math.random() * sectorCount);
      const targetSectorCenter = targetIndex * sectorAngle + sectorAngle / 2;

      const desiredFinalAngle = (Math.PI * 1.5 - targetSectorCenter);
      const randomOffset = (Math.random() - 0.5) * sectorAngle * 0.6;
      const desiredFinalAngleWithOffset = desiredFinalAngle + randomOffset;

      let delta = (desiredFinalAngleWithOffset - currentBaseAngle) % (2 * Math.PI);
      if (delta < 0) delta += 2 * Math.PI;

      const fullRotations = (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
      const totalDelta = fullRotations + delta;
      const finalAngle = currentBaseAngle + totalDelta;

      let lastSectorIndex = -1;

      // 音效控制变量
      let lastTickTime = 0; // 上次播放咔嗒声的时间
      const minTickInterval = 60; // 最小咔嗒间隔（毫秒），防止快速旋转时音效重叠爆音

      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      /**
       * 指针划过扇区边界时的反馈
       * 包括：
       *   1. 视觉反馈：指针轻微跳动
       *   2. 听觉反馈：播放"咔嗒"声（带动态频率控制）
       * 
       * 动态频率控制逻辑：
       *   通过检查上次播放时间与当前时间间隔，确保音效不会重叠
       *   转盘转得快时，自然达到最小间隔限制，音效密集但不会爆音
       *   转盘减速时，扇区切换间隔变长，音效自然变慢
       */
      function updatePointerTick(currentAngle) {
        const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const currentSectorIndex = Math.floor(normalizedAngle / sectorAngle);

        if (currentSectorIndex !== lastSectorIndex) {
          lastSectorIndex = currentSectorIndex;

          // 视觉反馈：指针跳动
          const pointer = document.querySelector('.pointer');
          if (pointer) {
            pointer.style.transform = 'translateX(-50%) translateY(-4px)';
            setTimeout(() => {
              pointer.style.transform = 'translateX(-50%) translateY(0)';
            }, 80);
          }

          // 听觉反馈：播放"咔嗒"声
          // 检查是否超过了最小间隔时间，防止快速旋转时音效重叠
          const now = performance.now();
          if (now - lastTickTime >= minTickInterval) {
            lastTickTime = now;
            playTickSound();
          }
        }
      }

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);

        const easedProgress = easeOutQuart(progress);
        const currentAngle = currentBaseAngle + totalDelta * easedProgress;

        onUpdate(currentAngle);
        updatePointerTick(currentAngle);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          const normalizedFinal = ((finalAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
          state.currentRotation = normalizedFinal;
          onComplete({ index: targetIndex, rotation: normalizedFinal });
        }
      }

      requestAnimationFrame(animate);
    }

    /**
     * 更新 CSS 变量，实现一键换肤
     * 将当前场景的配色同步到 :root CSS 变量
     */
    function updateCSSVariables(colors) {
      const root = document.documentElement.style;
      if (colors && colors.length >= 3) {
        root.setProperty('--primary-color', colors[0]);
        root.setProperty('--secondary-color', colors[1]);
        root.setProperty('--accent-color', colors[2]);
      }
    }

    /**
     * 切换场景
     * 读取新场景配置，重置转盘状态，更新所有 UI
     * @param {Number} sceneIndex - 目标场景在 SCENES 数组中的索引
     */
    function switchScene(sceneIndex) {
      if (sceneIndex === currentSceneIndex || state.isSpinning) return;

      const newScene = ALL_SCENES[sceneIndex];
      if (!newScene) return;

      currentSceneIndex = sceneIndex;

      // 深拷贝场景配置，避免修改原始模板
      APP_CONFIG = {
        ...newScene,
        colors: [...newScene.colors],
        defaultOptions: [...newScene.defaultOptions]
      };

      // 更新运行时状态
      state.options = [...APP_CONFIG.defaultOptions];
      state.currentRotation = 0;
      state.isSpinning = false;

      // 更新 CSS 变量（换肤）
      updateCSSVariables(APP_CONFIG.colors);

      // 更新标题
      dom.themeTitle.textContent = APP_CONFIG.themeName;
      dom.themeTitle.classList.remove('scene-transition');
      void dom.themeTitle.offsetWidth; // 强制回流触发动画
      dom.themeTitle.classList.add('scene-transition');

      // 重新设置 Canvas 内部渲染分辨率（物理像素）
      const logicalSize = APP_CONFIG.canvasSize;
      const physicalSize = Math.round(logicalSize * dpr);
      dom.canvas.width = physicalSize;
      dom.canvas.height = physicalSize;

      // 关键修复：设置 canvas.width/height 会重置整个 2D 上下文
      // 包括之前 ctx.scale(dpr, dpr) 的高清缩放也会丢失，必须重新设置
      dom.ctx.scale(dpr, dpr);

      // 清空输入框
      dom.optionInput.value = '';
      dom.optionInput.placeholder = '输入新选项，按回车或点击添加...';

      // 重绘转盘和 UI
      drawWheel(state.options, APP_CONFIG.colors, 0);
      updateUI();

      // 更新侧边栏高亮
      renderSidebarItems();

      // 移动端切换后自动收起
      if (window.innerWidth <= 768) {
        closeMobileSidebar();
      }
    }

    function updateUI() {
      const count = state.options.length;

      if (state.isSpinning) {
        dom.spinBtn.disabled = true;
        dom.spinBtn.classList.add('spinning');
        dom.hint.textContent = '旋转中...';
        dom.hint.classList.remove('warning');
      } else {
        dom.spinBtn.classList.remove('spinning');

        if (count < 2) {
          dom.spinBtn.disabled = true;
          dom.hint.textContent = '⚠️ 至少需要 2 个选项才能旋转';
          dom.hint.classList.add('warning');
        } else {
          dom.spinBtn.disabled = false;
          dom.hint.textContent = `当前共有 ${count} 个选项，点击按钮开始决定吧！`;
          dom.hint.classList.remove('warning');
        }
      }

      renderOptionsList();
    }

    function renderOptionsList() {
      dom.optionsList.innerHTML = '';

      state.options.forEach((option, index) => {
        const item = document.createElement('div');
        item.className = 'option-item';
        item.dataset.index = index;
        item.innerHTML = `
          <!-- 拖拽手柄：提示用户可以按住这里进行拖动 -->
          <span class="drag-handle" title="拖拽排序">⋮⋮</span>
          <span class="option-text">${option}</span>
          <button class="remove-btn" data-index="${index}">×</button>
        `;
        dom.optionsList.appendChild(item);
      });
    }

    /**
     * 渲染侧边栏场景列表
     */
    /**
     * 渲染侧边栏场景列表
     * 支持预设场景和自定义场景的混合显示
     * 自定义场景带删除按钮，预设场景不可删除
     */
    function renderSidebarItems() {
      dom.sidebarNav.innerHTML = '<div class="sidebar-nav-label">决策场景</div>';

      ALL_SCENES.forEach((scene, index) => {
        const item = document.createElement('div');
        item.className = `sidebar-item${index === currentSceneIndex ? ' active' : ''}`;
        item.dataset.index = index;

        // 预设场景无删除按钮，自定义场景有删除按钮
        const deleteButtonHTML = scene.isCustom
          ? `<button class="sidebar-item-delete" data-scene-id="${scene.id}" title="删除场景">🗑️</button>`
          : '';

        item.innerHTML = `
          <span class="sidebar-item-icon">${scene.icon}</span>
          <span class="sidebar-item-text">${scene.themeName}</span>
          <span class="sidebar-item-count">${scene.defaultOptions.length}项</span>
          ${deleteButtonHTML}
        `;

        // 点击场景项切换转盘
        item.addEventListener('click', (e) => {
          // 如果点击的是删除按钮，不切换场景
          if (e.target.classList.contains('sidebar-item-delete')) return;
          switchScene(index);
        });

        // 删除按钮事件
        if (scene.isCustom) {
          const deleteBtn = item.querySelector('.sidebar-item-delete');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            handleDeleteCustomScene(scene.id, index);
          });
        }

        dom.sidebarNav.appendChild(item);
      });

      // 在侧边栏导航底部添加"+ 新建自定义场景"按钮
      const addBtn = document.createElement('button');
      addBtn.className = 'sidebar-add-btn';
      addBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        <span>新建自定义场景</span>
      `;
      addBtn.addEventListener('click', openCustomSceneModal);
      dom.sidebarNav.appendChild(addBtn);
    }

    /**
     * 删除自定义场景
     * @param {String} sceneId - 场景 ID
     * @param {Number} sceneIndex - 场景在 ALL_SCENES 中的索引
     */
    function handleDeleteCustomScene(sceneId, sceneIndex) {
      if (!confirm('确定要删除这个自定义场景吗？')) return;

      // 从 localStorage 中删除
      removeCustomScene(sceneId);

      // 重新加载场景列表
      ALL_SCENES = getAllScenes();

      // 如果删除的是当前选中的场景，切换到第一个场景
      if (sceneIndex === currentSceneIndex) {
        currentSceneIndex = 0;
        switchScene(0);
      } else {
        // 否则更新索引（因为删除后索引会变化）
        if (sceneIndex < currentSceneIndex) {
          currentSceneIndex--;
        }
        renderSidebarItems();
      }
    }

    /**
     * 侧边栏展开/收起（桌面端）
     */
    function toggleSidebar() {
      dom.sidebar.classList.toggle('collapsed');
    }

    /**
     * 移动端打开侧边栏
     */
    function openMobileSidebar() {
      dom.sidebar.classList.add('mobile-open');
      dom.sidebarOverlay.classList.add('active');
    }

    /**
     * 移动端关闭侧边栏
     */
    function closeMobileSidebar() {
      dom.sidebar.classList.remove('mobile-open');
      dom.sidebarOverlay.classList.remove('active');
    }

    function showResultModal(result) {
      dom.modalResult.textContent = result;

      const emojis = ['🎉', '🎊', '✨', '🌟', '💫'];
      dom.modalEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      dom.modalOverlay.classList.add('active');
      createParticles();

      // 播放庆祝音效
      playCelebrationSound();
    }

    function createParticles() {
      dom.particles.innerHTML = '';
      const colors = APP_CONFIG.colors;
      const particleCount = 50;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = '-20px';
        particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.width = (Math.random() * 12 + 6) + 'px';
        particle.style.height = particle.style.width;
        particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
        particle.style.animationDelay = (Math.random() * 1) + 's';
        dom.particles.appendChild(particle);
      }

      setTimeout(() => {
        dom.particles.innerHTML = '';
      }, 4000);
    }

    function handleSpin() {
      if (state.isSpinning || state.options.length < 2) return;

      state.isSpinning = true;
      updateUI();

      document.querySelector('.wheel-container').classList.add('spinning');

      spinAnimation(APP_CONFIG.spinDuration,
        (currentAngle) => {
          drawWheel(state.options, APP_CONFIG.colors, currentAngle);
        },
        ({ index: targetIndex, rotation: targetRotation }) => {
          document.querySelector('.wheel-container').classList.remove('spinning');

          const result = {
            index: targetIndex,
            value: state.options[targetIndex]
          };
          state.isSpinning = false;
          state.currentRotation = targetRotation;

          setTimeout(() => {
            showResultModal(result.value);
            updateUI();
          }, 300);
        }
      );
    }

    function handleAddOption() {
      const value = dom.optionInput.value.trim();

      if (!value) return;
      if (state.options.includes(value)) {
        dom.optionInput.value = '';
        dom.optionInput.placeholder = '该选项已存在，请输入新选项...';
        setTimeout(() => {
          dom.optionInput.placeholder = '输入新选项，按回车或点击添加...';
        }, 2000);
        return;
      }

      state.options.push(value);
      APP_CONFIG.defaultOptions = [...state.options];
      ALL_SCENES[currentSceneIndex].defaultOptions = [...state.options];
      dom.optionInput.value = '';

      drawWheel(state.options, APP_CONFIG.colors, state.currentRotation);
      updateUI();
      renderSidebarItems();
    }

    function handleRemoveOption(index) {
      if (state.isSpinning) return;

      state.options.splice(index, 1);
      APP_CONFIG.defaultOptions = [...state.options];
      ALL_SCENES[currentSceneIndex].defaultOptions = [...state.options];

      drawWheel(state.options, APP_CONFIG.colors, state.currentRotation);
      updateUI();
      renderSidebarItems();
    }

    function handleCloseModal() {
      dom.modalOverlay.classList.remove('active');
    }

    /**
     * =============================================
     * 拖拽排序模块
     * 使用 SortableJS 实现选项列表的拖拽排序功能
     * =============================================
     */

    /**
     * 初始化拖拽排序
     * 绑定 SortableJS 到选项列表容器，监听拖拽结束事件
     */
    function initDragSort() {
      new Sortable(dom.optionsList, {
        // 拖拽手柄选择器：只有按住 .drag-handle 才能拖动
        handle: '.drag-handle',
        // 可拖拽的项选择器
        draggable: '.option-item',
        // 拖拽时的动画效果
        animation: 200,
        // 幽灵类名（拖拽中的占位符样式）
        ghostClass: 'sortable-ghost',
        // 选中类名
        chosenClass: 'sortable-chosen',
        // 拖拽中的类名
        dragClass: 'sortable-drag',
        // 拖拽结束时的回调
        onEnd: function(evt) {
          handleDragSortEnd(evt);
        }
      });
    }

    /**
     * 拖拽结束后的处理逻辑
     * 数据驱动视图：根据 DOM 最新顺序反向更新 options 数组，并重绘转盘
     * @param {Object} evt - SortableJS 事件对象，包含 oldIndex 和 newIndex
     */
    function handleDragSortEnd(evt) {
      const oldIndex = evt.oldIndex;
      const newIndex = evt.newIndex;

      // 如果位置没有变化，直接返回
      if (oldIndex === newIndex) return;

      // 根据 DOM 最新顺序反向更新 options 数组
      // 1. 从数组中移除被拖拽的项
      const movedItem = state.options.splice(oldIndex, 1)[0];
      // 2. 插入到新位置
      state.options.splice(newIndex, 0, movedItem);

      // 同步更新场景配置数据，保持数据一致性
      APP_CONFIG.defaultOptions = [...state.options];
      ALL_SCENES[currentSceneIndex].defaultOptions = [...state.options];

      // 联动重绘转盘：确保转盘扇区布局与列表顺序完全同步
      drawWheel(state.options, APP_CONFIG.colors, state.currentRotation);

      // 重新渲染列表 UI（更新删除按钮的 data-index）
      renderOptionsList();

      // 更新侧边栏显示的最新选项数量
      renderSidebarItems();
    }

    /**
     * =============================================
     * 事件绑定模块
     * =============================================
     */

    /**
     * =============================================
     * 自定义场景模态框控制模块
     * =============================================
     */

    /**
     * DOM 引用：自定义场景模态框相关元素
     */
    const customSceneModalOverlay = document.getElementById('customSceneModalOverlay');
    const customSceneNameInput = document.getElementById('customSceneName');
    const customSceneOptionsInput = document.getElementById('customSceneOptions');
    const customSceneSaveBtn = document.getElementById('customSceneSave');
    const customSceneCancelBtn = document.getElementById('customSceneCancel');

    /**
     * 打开自定义场景创建模态框
     */
    function openCustomSceneModal() {
      // 清空表单
      customSceneNameInput.value = '';
      customSceneOptionsInput.value = '';
      customSceneSaveBtn.disabled = false;

      // 显示模态框
      customSceneModalOverlay.classList.add('active');

      // 聚焦到名称输入框
      setTimeout(() => customSceneNameInput.focus(), 300);
    }

    /**
     * 关闭自定义场景创建模态框
     */
    function closeCustomSceneModal() {
      customSceneModalOverlay.classList.remove('active');
    }

    /**
     * 验证自定义场景表单
     * @returns {Boolean} - 表单是否有效
     */
    function validateCustomSceneForm() {
      const name = customSceneNameInput.value.trim();
      const optionsText = customSceneOptionsInput.value.trim();

      // 场景名称不能为空
      if (!name) {
        customSceneNameInput.focus();
        return false;
      }

      // 选项不能为空
      if (!optionsText) {
        customSceneOptionsInput.focus();
        return false;
      }

      // 解析选项（按换行符分割）
      const options = optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0);

      // 至少需要 2 个选项
      if (options.length < 2) {
        alert('请至少输入 2 个选项！');
        customSceneOptionsInput.focus();
        return false;
      }

      return true;
    }

    /**
     * 保存自定义场景
     * 1. 验证表单
     * 2. 创建场景对象
     * 3. 添加到 ALL_SCENES 和 localStorage
     * 4. 切换到新场景
     * 5. 关闭模态框
     */
    function saveCustomScene() {
      if (!validateCustomSceneForm()) return;

      const name = customSceneNameInput.value.trim();
      const optionsText = customSceneOptionsInput.value.trim();
      const options = optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0);

      // 创建场景对象
      const newScene = createCustomScene(name, options);

      // 保存到 localStorage
      addCustomScene(newScene);

      // 更新 ALL_SCENES
      ALL_SCENES = getAllScenes();

      // 关闭模态框
      closeCustomSceneModal();

      // 切换到新创建的场景（它在列表最后）
      const newSceneIndex = ALL_SCENES.length - 1;
      switchScene(newSceneIndex);
    }

    /**
     * =============================================
     * 事件绑定模块
     * =============================================
     */

    /**
     * 全局音频解锁触发器
     * 监听页面首次点击事件，在用户第一次交互时立即解锁音频系统
     * 解锁完成后自动移除监听器，避免不必要的性能开销
     */
    function handleFirstInteraction() {
      unlockAudio();
      // 解锁完成后，移除全局监听器（只需执行一次）
      document.removeEventListener('click', handleFirstInteraction);
      document.removeEventListener('touchstart', handleFirstInteraction);
    }

    function initEvents() {
      // 【关键修复】绑定全局首次交互监听器，提前解锁音频系统
      // 用户第一次点击页面任何位置时，都会触发音频解锁，消除首次音效延迟
      document.addEventListener('click', handleFirstInteraction);
      document.addEventListener('touchstart', handleFirstInteraction);

      dom.spinBtn.addEventListener('click', handleSpin);

      dom.addBtn.addEventListener('click', handleAddOption);

      dom.optionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleAddOption();
        }
      });

      dom.optionsList.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-btn')) {
          const index = parseInt(e.target.dataset.index);
          handleRemoveOption(index);
        }
      });

      dom.modalCloseBtn.addEventListener('click', handleCloseModal);

      dom.modalOverlay.addEventListener('click', (e) => {
        if (e.target === dom.modalOverlay) {
          handleCloseModal();
        }
      });

      // 侧边栏展开/收起
      // 【移动端修复】在手机上点击收起按钮时，调用 closeMobileSidebar 而不是 toggleSidebar
      // toggleSidebar 只切换 collapsed 类（桌面端折叠效果），对移动端无效
      dom.sidebarToggle.addEventListener('click', () => {
        // 移动端优先判断：如果侧边栏处于 mobile-open 状态，则收起它
        if (window.innerWidth <= 768 && dom.sidebar.classList.contains('mobile-open')) {
          closeMobileSidebar();
        } else {
          toggleSidebar();
        }
      });
      dom.sidebarToggle.addEventListener('touchend', (e) => {
        e.preventDefault();
        // 【移动端修复】触摸事件同样需要判断移动端状态
        if (window.innerWidth <= 768 && dom.sidebar.classList.contains('mobile-open')) {
          closeMobileSidebar();
        } else {
          toggleSidebar();
        }
      });

      // 移动端汉堡菜单
      // 【移动端修复】同时监听 click 和 touchend 事件
      dom.mobileMenuBtn.addEventListener('click', () => {
        if (dom.sidebar.classList.contains('mobile-open')) {
          closeMobileSidebar();
        } else {
          openMobileSidebar();
        }
      });
      dom.mobileMenuBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (dom.sidebar.classList.contains('mobile-open')) {
          closeMobileSidebar();
        } else {
          openMobileSidebar();
        }
      });

      // 点击遮罩关闭移动端侧边栏
      // 【移动端修复】同时监听 click 和 touchend 事件
      dom.sidebarOverlay.addEventListener('click', closeMobileSidebar);
      dom.sidebarOverlay.addEventListener('touchend', (e) => {
        e.preventDefault();
        closeMobileSidebar();
      });

      // 主题切换按钮
      dom.themeToggle.addEventListener('click', toggleTheme);

      // 静音控制按钮
      dom.muteToggle.addEventListener('click', toggleMute);

      // 初始化拖拽排序功能
      initDragSort();

      // =============================================
      // 自定义场景模态框事件绑定
      // =============================================

      // 保存按钮
      customSceneSaveBtn.addEventListener('click', saveCustomScene);

      // 取消按钮
      customSceneCancelBtn.addEventListener('click', closeCustomSceneModal);

      // 点击遮罩关闭模态框
      customSceneModalOverlay.addEventListener('click', (e) => {
        if (e.target === customSceneModalOverlay) {
          closeCustomSceneModal();
        }
      });

      // 回车键保存场景（在选项文本框中换行）
      customSceneNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveCustomScene();
        }
      });
    }

    /**
     * 应用入口
     * 1. 初始化主题（读取用户偏好或系统偏好）
     * 2. 初始化 DOM 和 Canvas
     * 3. 绘制初始转盘
     * 4. 绑定所有事件
     * 5. 注册窗口大小变化监听（移动端横竖屏适配）
     */
    function init() {
      // 先初始化主题，确保页面渲染时已经应用了正确的配色
      initTheme();

      // 初始化静音状态，读取用户上次保存的偏好
      initMuteState();

      // 初始化配色
      updateCSSVariables(APP_CONFIG.colors);

      initDOM();
      drawWheel(state.options, APP_CONFIG.colors, 0);
      renderSidebarItems();
      initEvents();

      // 【移动端适配】监听窗口大小变化，横竖屏切换时自动重绘转盘
      window.addEventListener('resize', handleResize);

      // 【移动端适配】防止 iOS Safari 双击缩放
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    }

    init();
  </script>
</body>
</html>
