  <circle cx="464" cy="128" r="12" fill="#ffffff" opacity="0.6" />
  <circle cx="480" cy="256" r="12" fill="#ffffff" opacity="0.8" />
  <circle cx="464" cy="384" r="12" fill="#ffffff" opacity="0.6" />
  <circle cx="256" cy="480" r="12" fill="#ffffff" opacity="0.8" />
  <circle cx="48" cy="384" r="12" fill="#ffffff" opacity="0.6" />
  <circle cx="32" cy="256" r="12" fill="#ffffff" opacity="0.8" />
  <circle cx="48" cy="128" r="12" fill="#ffffff" opacity="0.6" />
  
  <!-- 中心圆 -->
